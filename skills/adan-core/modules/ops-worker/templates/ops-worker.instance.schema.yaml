version: 1
required:
  - instance_id
  - enabled
  - timezone
  - schedule
  - repos
  - branch_policy
  - review_policy
  - alert_policy
  - scope_policy
  - blocker_policy
fields:
  instance_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]{1,62}$"
  enabled:
    type: boolean
  timezone:
    type: string
    example: "America/Chicago"
  schedule:
    type: object
    required: [mode, expr]
    fields:
      mode:
        enum: [cron, every]
      expr:
        type: string
        example: "*/15 * * * *"
  repos:
    type: array
    minItems: 1
    item:
      type: object
      required: [id, path, default_branch]
      fields:
        id:
          type: string
        path:
          type: string
        default_branch:
          type: string
  branch_policy:
    type: object
    required: [prefix, sync_from_default_before_edit, return_to_default_on_finish]
    fields:
      prefix:
        type: string
        example: "fix/issue-"
      sync_from_default_before_edit:
        type: boolean
      return_to_default_on_finish:
        type: boolean
  review_policy:
    type: object
    required: [require_comment_disposition]
    fields:
      require_comment_disposition:
        type: boolean
      accepted_dispositions:
        type: array
        item:
          enum: [applies, does_not_apply]
  alert_policy:
    type: object
    required: [routine_updates, notify_on_blocker]
    fields:
      routine_updates:
        enum: [always, business_hours_only, never]
      notify_on_blocker:
        enum: [always, business_hours_only, never]
  scope_policy:
    type: object
    required: [include, exclude]
    fields:
      include:
        type: array
        item:
          type: string
        example: [docs, templates, module_consistency, feature_flags_consistency]
      exclude:
        type: array
        item:
          type: string
        example: [release_tagging, auto_merge, destructive_repo_rewrites]
  blocker_policy:
    type: object
    required: [escalate_if]
    fields:
      escalate_if:
        type: array
        item:
          type: string
        example: [credentials_or_permissions, subjective_architecture_decision, external_dependency_outage]
  start_announcement:
    type: object
    required: [enabled]
    fields:
      enabled:
        type: boolean
        description: Enable automatic announcement when ops-worker starts processing an issue
      channel:
        type: string
        enum: [telegram, slack, discord]
        description: Messaging platform to use for announcement
        default: telegram
      target:
        type: string
        description: Required when start_announcement.enabled is true. Channel/chat ID or username to send announcement to
      timezone:
        type: string
        description: Timezone for start_time display (defaults to instance timezone if omitted)
        example: "America/Chicago"
      include_fields:
        type: array
        item:
          enum: [issue_number, issue_title, issue_url, branch, start_time, assignee]
        example: [issue_number, issue_title, branch, start_time]
        description: Fields to include in the announcement message
      template:
        type: string
        description: |
          Optional custom template for announcement.
          Available placeholders: {issue_number}, {issue_title}, {issue_url}, {branch}, {start_time}, {assignee}
          If omitted, uses default format
