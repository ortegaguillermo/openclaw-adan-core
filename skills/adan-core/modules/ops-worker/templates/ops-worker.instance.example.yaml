version: 1
instance_id: tracksmith
enabled: true
timezone: America/Chicago
schedule:
  mode: cron
  expr: "*/15 * * * *"
repos:
  - id: rollerderby-client
    path: /home/quadcore/projects/rollerderby-client
    default_branch: main
  - id: rollerderby-api
    path: /home/quadcore/projects/rollerderby-api
    default_branch: main
branch_policy:
  prefix: fix/issue-
  sync_from_default_before_edit: true
  return_to_default_on_finish: true
review_policy:
  require_comment_disposition: true
  accepted_dispositions: [applies, does_not_apply]
alert_policy:
  routine_updates: never
  notify_on_blocker: always
scope_policy:
  include:
    - docs
    - templates
    - module_consistency
    - feature_flags_consistency
  exclude:
    - release_tagging
    - auto_merge
    - destructive_repo_rewrites
blocker_policy:
  escalate_if:
    - credentials_or_permissions
    - subjective_architecture_decision
    - external_dependency_outage
start_announcement:
  enabled: true
  channel: telegram
  target: "6088001"
  timezone: America/Chicago
  include_fields:
    - issue_number
    - issue_title
    - branch
    - start_time
  # Optional: use custom template instead of default format
  # template: "🚀 Iniciando issue #{issue_number}: {issue_title} | rama: {branch} | hora: {start_time}"
