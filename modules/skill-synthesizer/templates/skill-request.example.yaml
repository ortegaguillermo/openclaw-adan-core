version: 1

skill:
  name: "example-skill"
  description: "What the skill does and when to use it"
  owner: ""

triggers:
  - "narrow trigger: user asks to generate release notes from commits"
  - "narrow trigger: agent needs to scaffold a skill from a structured request"

trigger_constraints:
  must_include_narrow_example: true
  avoid_broad_phrases:
    - "anything related to"
    - "all tasks about"
    - "general requests"

capabilities:
  - ""
  - ""

resources:
  include_templates: true
  include_references: true
  include_assets: false

risk:
  level: "low" # low|medium|high
  external_actions_allowed: false
  auto_publish_allowed: false

output:
  target_folder: "./skills/example-skill"
